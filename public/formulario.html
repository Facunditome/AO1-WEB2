<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Publicar Noticia</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="container">
        <h1>Nueva Noticia</h1>
        <form action="/publicar" method="post">
            <label for="titulo">Titulo:</label><br>
            <input id="titulo" name="titulo" type="text" required><br><br>

            <label for="cuerpo">Cuerpo:</label><br>
            <textarea id="cuerpo" name="cuerpo" rows="5" cols="60" required></textarea><br>

            <input type="submit" value="Enviar">
        </form>
        <br>
        <a href="/">Volver al listado</a>
    </div>
</body>
</html>
